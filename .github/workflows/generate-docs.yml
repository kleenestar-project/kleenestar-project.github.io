name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate - no automatic third-party resource loads in HTML
        run: |
          echo "Checking HTML files for external resource loads ..."
          # src= always triggers a network request
          src_hits=$(grep -rn 'src=["\x27]https\?://' site/*.html || true)
          # <link> with external href that are not metadata-only relations.
          # No third-party stylesheets are loaded - the page uses system fonts.
          link_hits=$(grep -rn '<link[^>]*href=["\x27]https\?://' site/*.html \
            | grep -v 'rel="canonical"\|rel="icon"\|rel="alternate"\|rel="manifest"' || true)
          if [ -n "$src_hits" ] || [ -n "$link_hits" ]; then
            printf "::error::External resource load detected in HTML:\n%s\n%s\n" \
              "$src_hits" "$link_hits"
            exit 1
          fi
          echo "OK - no external resources loaded automatically."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
